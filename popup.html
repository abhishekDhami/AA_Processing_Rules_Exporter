<!DOCTYPE html>
<html>

<head>
  <title>AA Processing Rules Exporter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 12px;
      width: 260px;
      background: #f9fafb;
    }

    h3 {
      margin: 0 0 10px;
      font-size: 16px;
      color: #111827;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 500;
    }

    button:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .msg {
      margin-top: 10px;
      font-size: 12px;
      color: #374151;
    }

    #loadingOverlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(6px);
      background: rgba(255, 255, 255, 0.6);
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 4px solid #ddd;
      border-top: 4px solid #2563eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-text {
      font-size: 13px;
      color: #111827;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    a {
      color: #2563eb;
      text-decoration: none;
      font-size: 12px;
    }
  </style>
</head>

<body>

  <h3>AA Processing Rules Exporter</h3>
  <button id="downloadBtn">Download JSON</button>
  <div id="status" class="msg"></div>

  <div id="loadingOverlay">
    <div class="loader-container">
      <div class="spinner"></div>
      <div class="loading-text">Extracting rules...</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
